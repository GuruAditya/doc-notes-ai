<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Summarizer</title>
  <link rel="stylesheet" href="/static/style.css">
  <script type="module" src="/static/index.js" defer></script>
</head>
<body>

<div id="auth-banner" style="background: #141419; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #252530; position: fixed; top: 0; width: 100%; z-index: 2000; box-sizing: border-box;">
  <h2 style="margin: 0; color: #fff; font-size: 18px;">📄 Document AI</h2>
  <div>
    <div id="login-group">
      <button id="guest-btn" style="background-color: #3e3f46; color: #e0e0e6; padding: 8px 16px; margin-right: 10px; border: 1px solid #4a4a5a;">Continue as Guest</button>
      <button id="login-btn" style="background-color: #4285F4; padding: 8px 16px; margin: 0;">Sign in with Google</button>
    </div>
    
    <div id="user-info" style="display: none; align-items: center; gap: 15px;">
      <span id="user-email" style="color: #a0a0b0; font-size: 14px;"></span>
      <button id="logout-btn" style="background-color: #3e3f46; padding: 8px 16px; margin: 0;">Sign Out</button>
    </div>
  </div>
</div>

<div class="hamburger-menu" style="top: 75px;"> <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

<div id="sidebar" class="sidebar">
  <a href="/" class="sidebar-logo">📁 Document History</a>
  <hr style="border-color: #252530; margin: 10px 0;">
  <div id="history-list">
    <span class="no-history">No documents uploaded yet</span>
  </div>
</div>

<div id="app-container" style="display: none; padding-top: 60px;">
  <div id="layout">
    
    <div id="chat-section" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="color: #fff; margin: 0;">💬 Ask AI</h3>
        <button id="clear-chat-btn" style="background: transparent; border: 1px solid #4a4a5a; color: #a0a0b0; padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer;">Clear</button>
      </div>
      <div id="chat-log"></div>
      <form id="chat-form" style="display: flex; gap: 10px; margin-top: auto;">
        <input type="text" id="chat-input" placeholder="Ask a question..." required style="flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #4a4a5a; background: #141419; color: #fff; outline: none;">
        <button type="submit" style="max-width: 80px; padding: 12px;">Ask</button>
      </form>
    </div>

    <div id="main-content">
      <form id="upload-form">
        <h3 style="margin-top: 0; color: #fff;">Upload Document</h3>
        <input type="file" id="ads" name="ads" accept="application/pdf" required>
        <div class="btn-group"> 
          <button type="submit" id="submit">Submit File</button>
          <button type="reset" id="reset">Reset</button>
        </div>
      </form>
      
      <div id="preview-container" style="display: none; margin-top: 25px; margin-bottom: 25px;">
        <div id="viewer-window" style="width: 100%; height: 500px; border-radius: 8px; overflow: hidden; background: #1e1e24; border: 1px solid #4a4a5a;">
          </div>
      </div>
      
      <div style="display: flex; align-items: center; gap: 10px; margin-top: 20px; margin-bottom: 15px;">
        <span style="color: #a0a0b0; font-size: 14px;">Summary Engine:</span>
        <select id="summary-mode" style="padding: 8px; border-radius: 4px; background: #2a2a35; color: #fff; border: 1px solid #4a4a5a; outline: none; cursor: pointer;">
          <option value="simple">⚡ Fast & Simple</option>
          <option value="complex">🧠 Deep Reflexion</option>
        </select>
      </div>
      
      <button id="summarizeBtn">✨ Generate Summary</button>
      <p id="result" style="white-space: pre-wrap; margin-top: 20px;"></p>
    </div>

    <div id="comments-section" style="display: none;">
      <h3 style="color: #fff; margin-top: 0; margin-bottom: 15px;">📓 Document Notes</h3>
      <form id="comment-form" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
        <textarea id="comment-input" placeholder="Jot down a note..." required rows="3"></textarea>
        <button type="submit" style="align-self: flex-end; padding: 10px 20px;">Post</button>
      </form>
      <div id="comments-list"></div>
    </div>

  </div>
</div>

<div id="login-prompt" style="text-align: center; margin-top: 150px; color: #a0a0b0;">
  <h2>Please sign in to access your Document Assistant.</h2>
</div>

</body>
</html>
