<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document Summarizer</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/index.js" defer></script>
</head>
<body>

<div class="hamburger-menu">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</div>

<div id="sidebar" class="sidebar">
  <a href="/" class="sidebar-logo">📁 Document History</a>
  <hr style="border-color: #252530; margin: 10px 0;">
  
  <div id="history-list">
    <span class="no-history">No documents uploaded yet</span>
  </div>
</div>

<div id="layout">
  
  <div id="main-content">
    <form id="upload-form">
      <h3 style="margin-top: 0; color: #fff;">Upload Document</h3>
      <input type="file" id="ads" name="ads" accept="application/pdf" required>
      <div class="btn-group"> 
        <button type="submit" id="submit">Submit File</button>
        <button type="reset" id="reset">Reset</button>
      </div>
    </form>

    <button id="summarizeBtn">✨ Summarize Document</button>
    <p id="result" style="white-space: pre-wrap; margin-top: 20px;"></p>
  </div>

  <div id="comments-section" style="display: none;">
    <h3 style="color: #fff; margin-top: 0; margin-bottom: 15px;">📓 Document Notes</h3>
    
    <form id="comment-form" style="display: flex; gap: 10px; margin-bottom: 20px;">
      <input type="text" id="comment-input" placeholder="Jot down a note..." required>
      <button type="submit" style="max-width: 70px; padding: 10px;">Post</button>
    </form>

    <div id="comments-list"></div>
  </div>

</div> 

</body>
</html>
